name: Release

on:
  release:
    types: [published]

env:
  DAGGER_VERSION: "0.20.1"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Dagger
        uses: dagger/dagger-for-github@v8.2.0
        with:
          version: ${{ env.DAGGER_VERSION }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image
        run: |
          dagger call \
            build-push-image \
              --registry=${{ vars.REGISTRY }} \
              --tags="${{ github.event.release.tag_name }}" \
              --tags="latest" \
              --version="${{ github.event.release.tag_name }}" \
              --commit="${{ github.sha }}" \
        env:
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Build upload release artifacts
        run: |
          dagger call \
            release-latest \
              --version="${{ github.event.release.tag_name }}" \
              --commit="${{ github.sha }}" \
              --post-hog-public-key="${{ secrets.POSTHOG_API_KEY }}" \
              --endpoint=env://BUCKET_ENDPOINT \
              --bucket=env://BUCKET_NAME \
              --access-key-id=env://BUCKET_ACCESS_KEY_ID \
              --secret-access-key=env://BUCKET_SECRET_ACCESS_KEY \
              --registry="${{ vars.CONTAINER_REGISTRY }}" \
              --registry-username=AWS \
              --registry-password=env://REGISTRY_PASSWORD \
            export \
              --path=./build
        env:
          BUCKET_ENDPOINT: ${{ secrets.BUCKET_ENDPOINT }}
          BUCKET_NAME: ${{ secrets.BUCKET_NAME }}
          BUCKET_ACCESS_KEY_ID: ${{ secrets.BUCKET_ACCESS_KEY_ID }}
          BUCKET_SECRET_ACCESS_KEY: ${{ secrets.BUCKET_SECRET_ACCESS_KEY }}
          REGISTRY_PASSWORD: ${{ steps.ecr-login.outputs.password }}
          DAGGER_CLOUD_TOKEN: ${{ secrets.DAGGER_CLOUD_TOKEN }}

      - name: Upload artifacts to release
        run: |
          mkdir -p dist
          for file in $(find build -type f); do
            rel_path="${file#build/}"
            os=$(dirname "$rel_path" | cut -d'/' -f1)
            arch=$(dirname "$rel_path" | cut -d'/' -f2)
            filename=$(basename "$file")

            if [[ "$filename" == *.sha256 ]]; then
              base="${filename%.sha256}"
              new_name="${base}-${os}-${arch}.sha256"
            else
              new_name="${filename}-${os}-${arch}"
            fi

            cp "$file" "dist/$new_name"
          done

          gh release upload "${{ github.event.release.tag_name }}" dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
